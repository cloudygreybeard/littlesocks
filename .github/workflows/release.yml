name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - uses: goreleaser/goreleaser-action@v7
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-tap:
    needs: release
    uses: cloudygreybeard/homebrew-tap/.github/workflows/release-homebrew-formula.yml@main
    with:
      package-name: littlesocks
      binary-name: littlesocks
      formula-class: Littlesocks
      formula-desc: "SOCKS5 proxy server"
      artifact-style: goreleaser
      private: false
    secrets:
      deploy-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
